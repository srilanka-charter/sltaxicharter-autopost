name: SLtaxicharter Auto Post

on:
  schedule:
    # JST 06:00 = UTC 21:00 (previous day)
    - cron: '0 21 * * *'
    # JST 12:00 = UTC 03:00
    - cron: '0 3 * * *'
    # JST 19:00 = UTC 10:00
    - cron: '0 10 * * *'
  workflow_dispatch:  # Allow manual trigger for testing

permissions:
  contents: write

jobs:
  post_tweet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install tweepy

      - name: Post tweet
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          python post_tweet.py

      - name: Keep repository active
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Last run: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > last_run.txt
          git add last_run.txt
          git commit -m "Auto post: $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git push || echo "Push failed, continuing"
