name: SLtaxicharter Auto Post

on:
  schedule:
    # Run every 30 minutes - script checks if it's 6:00, 12:00, or 19:00 JST
    - cron: '0,30 * * * *'
  workflow_dispatch:  # Allow manual trigger (FORCE_POST=true)

permissions:
  contents: write

jobs:
  post_tweet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install tweepy

      - name: Post tweet (checks JST 6:00 / 12:00 / 19:00)
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          FORCE_POST: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: |
          python post_tweet.py

      - name: Commit last_post.txt and keep repo active
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Last run: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > last_run.txt
          git add last_run.txt last_post.txt 2>/dev/null || git add last_run.txt
          git commit -m "Auto run: $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git push || echo "Push failed, continuing"
